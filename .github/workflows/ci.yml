name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  AUTH_SECRET: "ci-only-placeholder-secret-not-used-at-runtime"
  # 32 raw bytes, base64 — must decode to exactly 32 bytes (src/lib/env.ts),
  # never used to encrypt anything real in CI, so no secret needed.
  ENCRYPTION_KEY: "7BuXXAOGtAQy/HCn49n6/ezoRKA7bbGvxBW8SRm2DyQ="

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma generate

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm build
